name: Deploy CineFlow to Cloud

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cineflow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot" 
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests
        env:
          FLASK_CONFIG: testing
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          SECRET_KEY: super-secret-key-for-test
          JWT_SECRET_KEY: jwt-super-secret-key

        run: pytest
  deploy:
    name: Deploy to Cloud
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.HOST}}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/ndhuwng05/CineFlow
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            source .venv/bin/activate
            pip install -r requirements.txt
            export FLASK_APP=cineflow.py
            export FLASK_CONFIG=development
            flask deploy
            sudo systemctl restart cineflow

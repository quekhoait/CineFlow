{% extends 'layout/base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <h1 class="text-4xl font-serif italic mb-10 text-gray-800">Thông tin cá nhân</h1>

    <div class="bg-white rounded-[3rem] shadow-[0px_10px_30px_rgba(0,0,0,0.1)] p-10 w-full max-w-2xl relative z-10 border border-gray-100">

        <div class="flex justify-end mb-4">
            <button id="editBtn" class="bg-[#33CCFF] hover:bg-[#2bb5e0] text-white px-6 py-1 rounded-lg text-sm transition-all shadow-md">
                Cập nhật
            </button>
        </div>

        <div class="flex flex-col md:flex-row items-center gap-10">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1974&auto=format&fit=crop"
                     alt="Profile"
                     class="w-32 h-32 rounded-full object-cover border-4 border-white shadow-lg">
            </div>

            <div class="flex-1 space-y-4 w-full" id="infoForm">
                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Họ và tên:</span>
                    <span class="info-text font-medium text-gray-800">Nguyễn Ngọc Lan</span>
                    <input type="text" class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none" value="Nguyễn Ngọc Lan">
                </div>

                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Email:</span>
                    <span class="info-text font-medium text-gray-800">lannguyen@gamil.com</span>
                    <input type="email" class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none" value="lannguyen@gamil.com">
                </div>

                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Số điện thoại:</span>
                    <span class="info-text font-medium text-gray-800">0899654782</span>
                    <input type="text" class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none" value="0899654782">
                </div>

                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Vai trò:</span>
                    <span class="font-medium text-gray-800">Thành viên</span>
                    </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% block script%}
  <script src="{{ url_for('static', filename='javascript/profile.js') }}"></script>
{% endblock %}

 <div class="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-6 flex gap-6 shadow-sm mb-6 border border-white">
            <div class="w-32 h-48 flex-none rounded-2xl overflow-hidden relative shadow-lg">
                <span class="absolute top-2 left-2 bg-red-600/80 text-white text-[10px] px-2 py-1 rounded-lg font-bold">{{age_limit}}</span>
                <img src="{{poster}}" class="w-full h-full object-cover">
            </div>
            <div class="flex-grow">
                <h3 class="text-xl font-bold text-gray-800 mb-1">{{title}}</h3>
                <p class="text-sm text-gray-400 mb-4">{{duration}} phút | {{genre}}</p>

                <div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
                        {{show_time}}
                </div>
            </div>
        </div>

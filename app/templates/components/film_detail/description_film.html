<div class="max-w-6xl mx-auto p-6 bg-gray-900 text-white rounded-2xl shadow-2xl flex flex-col md:flex-row gap-8 items-start">

    <div class="w-full md:w-1/4 group shrink-0">
        <div class="relative overflow-hidden rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] transition-transform duration-300 group-hover:scale-105">
            <img src="{{poster}}" alt="Poster Phim" class="w-full object-cover aspect-[2/3]">
        </div>
    </div>

    <div class="w-full md:w-3/4 flex flex-col justify-center">
        <div class="mb-4">
            <span class="bg-red-600 text-white px-3 py-1 rounded-md text-xs font-black uppercase tracking-wider">
                T{{age-limit}}
            </span>
            <span class="ml-2 text-gray-400 text-sm italic border-l border-gray-700 pl-3">
                Phim dành cho khán giả từ đủ {{age-limit}} tuổi trở lên
            </span>
        </div>

        <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 leading-tight">
            {{title}}
        </h1>

        <div class="flex flex-wrap items-center gap-4 mb-6 text-sm font-medium">
            <div class="flex items-center text-orange-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" /></svg>
                {{genre}}
            </div>
            <div class="flex items-center text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                {{duration}} phút
            </div>

        </div>

        <div class="h-px w-full bg-gradient-to-r from-gray-700 to-transparent mb-6"></div>

        <div class="space-y-3">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em]">Mô tả nội dung</h3>
            <p class="text-gray-300 leading-relaxed text-lg font-light italic">
                "{{description}}"
            </p>
        </div>
    </div>
</div>

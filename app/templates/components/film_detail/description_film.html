  <div class="w-full md:w-1/3">
                <img src="{{poster}}" alt="Poster Phim" class="w-full rounded-lg shadow-2xl border border-gray-700">
            </div>

    <div class="w-full md:w-2/3">
                    <h1 class="text-4xl font-bold mb-4 tracking-tight">{{title}}</h1>
                    <div class="space-y-2 text-gray-300 mb-6">
                        <p>{{genre}}</p>
                        <p>{{duration}}'</p>
                        <p class="inline-block bg-yellow-500 text-black px-2 py-1 rounded font-bold text-xs">T{{age-limit}}: Phim dành cho khán giả từ đủ {{age-limit}} tuổi trở lên</p>
                    </div>

                <div class="mb-6">
                    <h3 class="text-neon font-bold mb-2 uppercase">Mô tả</h3>
                    <p class="text-sm leading-relaxed text-gray-400">
                        {{description}}
                    </p>
                </div>
            </div>

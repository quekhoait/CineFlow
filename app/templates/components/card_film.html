<div class="flex-none w-[240px]">
    <div class="flex flex-col items-center rounded-xl border-2 border-gray-500 shadow-sm py-3 px-3 w-full">
        <div class="w-full aspect-[3/4] overflow-hidden rounded-xl shadow-lg border-2 border-white mb-2">
            <img src="{{poster}}" alt="Movie Poster" class="w-full h-full object-cover">
        </div>
        <div class="flex items-center justify-center space-x-2 bg-slate-800 rounded-full px-2 py-2 w-full border border-gray-400 cursor-pointer" onclick="handleSelectFilm('{{id}}')">
            <div class="flex items-baseline space-x-1">
                <span class="text-amber-400 text-sm font-medium">{{content}}</span>
            </div>
        </div>
    </div>
</div>

<div id="auth" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4 hidden">
    <div class="w-full max-w-md bg-white rounded-[2rem] p-8 relative">
        <button id="close-auth" class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <div class="flex border-b border-gray-100 mb-6">
            <button id="login" class="tab-auth pb-3 px-4 text-blue-600 font-semibold border-b-2 border-blue-600 transition">
                Đăng nhập
            </button>
            <button id="regis"
                    class="tab-auth pb-3 px-4 text-gray-400 font-semibold hover:text-gray-600 transition border-b-2 border-transparent">
                Đăng ký
            </button>
        </div>

        <h2 id="title-auth" class="text-2xl font-bold mb-6">Chào mừng quay trở lại!</h2>

        <form id="form-auth" class="space-y-4">
            {%include 'components/user/tab-login.html'%}
        </form>
    </div>
</div>

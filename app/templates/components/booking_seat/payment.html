<div class="space-y-8 w-full gap-4 flex">

    <div class="w-[60%] bg-white rounded-[2.5rem] p-10 shadow-lg border border-gray-100 relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-24 h-24 border-gray-200 rounded-full"></div>

        <div class="mb-10 relative">
            <h3 class="text-lg uppercase tracking-widest text-gray-800 mb-6 font-medium underline">Tóm tắt đơn hàng</h3>

            <table class="w-full text-sm text-gray-700">
                <thead class="text-gray-500">
                <tr>
                    <th class="text-left pl-10 font-medium pb-1 uppercase text-xl tracking-wider">Mô tả</th>
                    <th class="text-center font-medium pb-1 uppercase text-xl tracking-wider">Số lượng</th>
                    <th class="text-right pr-10 font-medium pb-1 uppercase text-xl tracking-wider">Thành tiền</th>
                </tr>
                </thead>
                <tbody id="invoice_items">
                </tbody>
                <tfoot>
                <tr class="border-t border-gray-400 pt-10 h-[5px]"></tr>
                <tr class="text-gray-800 bg-[#85DFF240]">
                    <td class="py-2 pl-10 font-bold text-lg rounded-l-full">Tổng cộng</td>
                    <td colspan="1"></td>
                    <td class="py-2 pr-10 text-right font-bold rounded-r-full text-lg text-[#A50064]" id="final_total">0
                        VND
                    </td>
                </tr>
                </tfoot>
            </table>

        </div>

        <div class="mb-10">
            <h3 class="text-lg uppercase tracking-widest text-gray-800 mb-2 font-medium underline ">Thông tin cá
                nhân</h3>
            <div id="info_user">
                <!--User info-->
            </div>
        </div>

        <div>
            <h3 class="text-lg uppercase tracking-widest text-gray-800 mb-2 font-medium underline">Phương thức thanh
                toán</h3>
            <div class="space-y-3">
                <label class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm cursor-pointer hover:border-[#98E2E7] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-[#A50064] rounded-xl flex items-center justify-center overflow-hidden">
                            <img src="https://res.cloudinary.com/ds11ggie4/image/upload/q_auto/f_auto/v1775102045/MoMo_Logo_App.svg_ljj2k8.png"
                                 alt="MoMo" class="w-8 h-8 object-contain"/>
                        </div>
                        <div>
                            <p class="font-bold text-gray-700">Ví MoMo</p>
                            <p class="text-xs text-gray-400">Thanh toán qua ứng dụng MoMo</p>
                        </div>
                    </div>

                    <div class="relative flex items-center justify-center">
                        <input type="radio" name="payment_method" checked value="momo"
                               class="peer appearance-none w-6 h-6 border-2 border-gray-200 rounded-full checked:border-[#98E2E7] transition-all cursor-pointer">
                        <div class="absolute w-3 h-3 bg-[#98E2E7] rounded-full scale-0 peer-checked:scale-100 transition-transform pointer-events-none"></div>
                    </div>
                </label>

            </div>
        </div>
    </div>

    <div class="w-[30%] mt-0 z-10" id="info_film">
        <!--Film info-->
    </div>

</div>

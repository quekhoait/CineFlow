{% macro movie_schedule(movie) %}
<div class="bg-white/80 rounded-[2.5rem] p-6 flex gap-6 shadow-sm mb-6">
    <div class="w-32 h-48 flex-none rounded-2xl overflow-hidden relative">
        <span class="absolute top-2 left-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded">TV SERIES</span>
        <img src="{{ movie.poster }}" class="w-full h-full object-cover">
    </div>

    <div class="flex-grow">
        <h3 class="text-xl font-bold text-gray-800">{{ movie.title }}</h3>
        <p class="text-sm text-gray-400 mb-4">{{ movie.sub_title }} | {{ movie.genre }}</p>

        <div class="grid grid-cols-6 gap-2">
            {% for time in movie.slots %}
                <button class="bg-white border border-gray-100 py-2 rounded-lg text-xs font-medium hover:bg-cyan-100 transition-colors">
                    {{ time }}
                </button>
            {% endfor %}
        </div>
    </div>
</div>
{% endmacro %}

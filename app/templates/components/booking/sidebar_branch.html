{% macro sidebar_branch(cities) %}
<div class="bg-white/60 backdrop-blur-md rounded-[2rem] p-6 shadow-sm border border-white w-full max-w-[350px]">
    <h3 class="italic text-right mb-4 text-gray-600">Chi nhánh</h3>
    {% for city in cities %}
        <div class="mb-6">
            <h4 class="text-purple-800 font-bold mb-3 border-b border-purple-200 pb-1">{{ city.name }}</h4>
            <div class="space-y-2">
                {% for branch in city.branches %}
                    <button class="w-full text-left px-4 py-2 rounded-xl bg-white border border-gray-100 hover:bg-purple-50 transition-colors shadow-sm text-sm">
                        {{ branch.name }}
                    </button>
                {% endfor %}
            </div>
        </div>
    {% endfor %}
</div>
{% endmacro %}

{% extends 'layout/base.html' %}

{% block content %}

<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-40">
    <img src="/static/image/decoraterbg2.png" alt=""
         class="left-[150px] top-[200px] absolute w-[1000px] h-auto rotate-[0deg]">

</div>

<div class="flex flex-col items-center justify-center p-4 relative overflow-hidden">
    <h1 class="text-6xl font-serif mb-3 text-black" style="font-family: 'Meow Script', sans-serif;">Thông tin cá
        nhân</h1>
    <div class="bg-white rounded-[3rem] shadow-[0px_10px_30px_rgba(0,0,0,0.1)] p-10 w-full max-w-2xl relative z-10 border border-gray-100">

        <div class="flex justify-end mb-4">
            <button id="updateBtn"
                    class="bg-[#33CCFF] hover:bg-[#2bb5e0] text-white px-6 py-1 rounded-lg text-sm transition-all shadow-md">
                Cập nhật
            </button>
            <button id="editBtn"
                    class="bg-[#33CCFF] hover:bg-[#2bb5e0] text-white px-6 py-1 rounded-lg text-sm transition-all shadow-md hidden">
                Lưu
            </button>
            <button id="cancelBtn"
                    class="bg-[#33CCFF] hover:bg-[#2bb5e0] text-white px-6 py-1 rounded-lg text-sm transition-all shadow-md hidden">
                Hủy
            </button>
        </div>

        <div class="flex flex-col md:flex-row items-center gap-10">
            <div class="relative group cursor-pointer" id="avatarContainer">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1974&auto=format&fit=crop"
                     alt="Profile"
                     class="avatar-info w-32 h-32 rounded-full object-cover border-4 border-white shadow-lg transition-all group-hover:blur-[2px]">

                <div id="avatarOverlay"
                     class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
                    <span class="text-white text-sm font-medium">Edit</span>
                </div>

                <input type="file" id="avatarInput" class="hidden" accept="image/*">
            </div>

            <div class="flex-1 space-y-4 w-full" id="infoForm">
                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Họ và tên:</span>
                    <span class="info-text font-medium text-gray-800">Nguyễn Ngọc Lan</span>
                    <input type="text" name="full_name"
                           class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none"
                           value="Nguyễn Ngọc Lan">
                </div>

                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Email:</span>
                    <span class="info-text font-medium text-gray-800">lannguyen@gamil.com</span>
                    <input type="text" name="email"
                           class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none"
                           readonly disabled>
                </div>

                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Username:</span>
                    <span class="info-text font-medium text-gray-800">Thành viên</span>
                    <input type="text" name="username"
                           class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>

                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Số điện thoại:</span>
                    <span class="info-text font-medium text-gray-800">0899654782</span>
                    <input type="text" name="phone_number"
                           class="info-input hidden w-1/2 border rounded-md px-2 py-1 focus:ring-2 focus:ring-blue-400 outline-none"
                           value="0899654782">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script%}
<script type="module" src="{{ url_for('static', filename='javascript/pages/profile.js') }}"></script>
{% endblock %}

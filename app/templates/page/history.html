{% extends 'layout/base.html' %}

{% block content %}
<div class="max-w-5xl mx-auto  z-1 p-8  relative overflow-hidden">
    <div class="relative bg-[#e5e7eb] rounded-[2rem] shadow-xl z-10 mt-24 p-4">
        <h1 class="text-center text-4xl font-bold title-font mb-8 text-gray-700">Lịch sử đặt vé</h1>

        <div class="relative max-w-md mx-auto mb-10">
            <input type="text" placeholder="Search" class="w-full pl-10 pr-10 py-2 bg-gray-200/50 border-none rounded-full focus:ring-2 focus:ring-blue-300 outline-none text-sm shadow-inner">
            <span class="absolute inset-y-0 right-3 flex items-center">
                  <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>

        <div id="history-list" class="space-y-4">
            <!--History-->
        </div>

        <div id="pagination-controls" class="flex justify-center items-center space-x-6 mt-10 mb-4 print:hidden">
            <!--Pagination-->
        </div>
    </div>
</div>
{% endblock %}

{% block script%}
 <script type="module" src="{{ url_for('static', filename='javascript/pages/history.js') }}"></script>
{% endblock%}
